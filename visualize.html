<script>
// GPS 轨迹数据
var gpxData = [
<?php
// Read CSV and output as JavaScript array
$handle = fopen('fit_export.csv', 'r');
fgetcsv($handle); // skip header
$first = true;
$points_js = [];
while (($row = fgetcsv($handle)) !== false) {
    if (empty($row[2]) || empty($row[3])) continue;
    $lat = (float)$row[2];
    $lon = (float)$row[3];
    $hr = (float)$row[5];
    $speed = (float)$row[6];
    $points_js[] = "[$lat, $lon, $hr, $speed]";
}
fclose($handle);
echo implode(",\n  ", $points_js);
?>
];

// Filter out null points
var trackPoints = gpxData.filter(p => !isNaN(p[0]) && !isNaN(p[1]));

// Initialize map
var map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

// Create polyline
var latlngs = trackPoints.map(p => [p[0], p[1]]);
var polyline = L.polyline(latlngs, {color: '#2196F3', weight: 4, opacity: 0.8}).addTo(map);

// Fit bounds
if (latlngs.length > 0) {
  map.fitBounds(polyline.getBounds());
}

// Add start/end markers
if (latlngs.length > 0) {
  L.marker(latlngs[0]).addTo(map).bindPopup('起点').openPopup();
  L.marker(latlngs[latlngs.length - 1]).addTo(map).bindPopup('终点');
}

// Prepare data for charts - sample every N points to avoid overloading
var sampleInterval = Math.max(1, Math.floor(trackPoints.length / 100));
var distanceKm = [];
var heartRate = [];
var speedKmh = [];

var cumDist = 0;
var prevLatlng = null;

for (var i = 0; i < trackPoints.length; i += sampleInterval) {
  var p = trackPoints[i];
  var lat = p[0], lng = p[1], hr = p[2], sp = p[3];

  if (prevLatlng && !isNaN(hr) && hr > 0) {
    // Approximate distance from previous point (very rough)
    var dLat = (lat - prevLatlng[0]) * Math.PI / 180;
    var dLng = (lng - prevLatlng[1]) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos((prevLatlng[0]) * Math.PI / 180) * Math.cos(lat * Math.PI / 180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    var dist = 6371 * c; // Earth radius in km
    cumDist += dist;

    if (isNaN(hr)) hr = null;
    if (!isNaN(hr) && hr > 0) {
      distanceKm.push(cumDist.toFixed(1));
      heartRate.push(hr);
      speedKmh.push(sp);
    }
  }
  prevLatlng = [lat, lng];
}

// Heart Rate Chart
var ctxHr = document.getElementById('hrChart').getContext('2d');
new Chart(ctxHr, {
  type: 'line',
  data: {
    labels: distanceKm,
    datasets: [{
      label: '心率 (bpm)',
      data: heartRate,
      borderColor: '#f44336',
      backgroundColor: 'rgba(244, 67, 54, 0.1)',
      fill: true,
      tension: 0.2
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      title: { display: true, text: '心率变化' },
      legend: { display: false }
    },
    scales: {
      x: { title: { display: true, text: '距离 (km)' }},
      y: { min: Math.min(...heartRate) - 10, max: Math.max(...heartRate) + 10 }
    }
  }
});

// Speed Chart
var ctxSpeed = document.getElementById('speedChart').getContext('2d');
new Chart(ctxSpeed, {
  type: 'line',
  data: {
    labels: distanceKm,
    datasets: [{
      label: '速度 (km/h)',
      data: speedKmh,
      borderColor: '#4CAF50',
      backgroundColor: 'rgba(76, 175, 80, 0.1)',
      fill: true,
      tension: 0.2
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      title: { display: true, text: '速度变化' },
      legend: { display: false }
    },
    scales: {
      x: { title: { display: true, text: '距离 (km)' }},
      y: { title: { display: true, text: '速度 (km/h)' }}
    }
  }
});
</script>
